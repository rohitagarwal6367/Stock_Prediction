<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(to right, #f8f9fa, #e3f2fd);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
        }

        .card {
            background: #ffffffcc;
            border-radius: 20px;
            padding: 50px 35px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            text-align: center;
        }

        .card h2 {
            font-weight: bold;
            margin-bottom: 30px;
            color: #0d6efd;
        }

        .form-control {
            background: #f1f3f5;
            border: 1px solid #ced4da;
            border-radius: 12px;
            color: #333;
            padding: 12px;
            margin-bottom: 20px;
        }

        .btn-custom {
            background-color: #0d6efd;
            border: none;
            border-radius: 12px;
            padding: 12px;
            width: 100%;
            font-weight: bold;
            color: #fff;
            font-size: 1rem;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background-color: #0b5ed7;
            transform: scale(1.03);
        }

        .footer-note {
            margin-top: 15px;
            font-size: 0.85rem;
            color: #6c757d;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Stock Predictor</h2>

        <!-- ✅ FORM UPDATED -->
        <form id="predictionForm">
            <input type="text" class="form-control" name="stock" placeholder="Enter Stock Ticker e.g. POWERGRID.NS" required>
            <button type="submit" class="btn btn-custom">Predict</button>
        </form>

        <div class="footer-note">
            Enter the stock ticker symbol and click Predict to see trends.
        </div>
    </div>

    <!-- ✅ JAVASCRIPT (IMPORTANT) -->
    <script>
        const form = document.getElementById("predictionForm");

        form.addEventListener("submit", function(e) {
            e.preventDefault();

            const formData = new FormData(form);

            let backendURL;

            // Detect environment
            if (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1") {
                backendURL = "http://127.0.0.1:10000/predict";
            } else {
                backendURL = "https://stock-prediction-05al.onrender.com/predict";
            }

            // Show loading
            document.body.innerHTML = "<h2 style='text-align:center;margin-top:50px;'>Loading... Please wait ⏳</h2>";

            fetch(backendURL, {
                method: "POST",
                body: formData
            })
            .then(response => response.text())
            .then(data => {
                document.open();
                document.write(data);
                document.close();
            })
            .catch(error => {
                alert("Error: " + error);
            });
        });
    </script>
</body>
</html>
